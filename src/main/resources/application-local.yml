spring:
  datasource:
    url: jdbc:mysql://localhost:3306/moadeal?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=Asia/Seoul
    username: moadeal_user
    password: moadeal_pass123
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update               # 로컬에서는 update (운영은 반드시 none 또는 validate)
    show-sql: true

  data:
    redis:
      host: localhost
      port: 6379

jwt:
  secret: localSecretKeyMustBe256BitsLongForHS256Algorithm
  access-expiration: 1800000         # 30분 (ms)
  refresh-expiration: 604800000      # 7일 (ms)