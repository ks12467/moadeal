services:

  mysql:
    image: mysql:8.0
    container_name: moadeal-mysql
    platform: linux/amd64        # Apple Silicon(M1/M2/M3) 필수
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql        # 컨테이너 재시작해도 데이터 유지
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql  # 초기 SQL (선택)
    networks:
      - moadeal-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: moadeal-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data             # Redis 데이터 영속화
    networks:
      - moadeal-network
    command: redis-server --appendonly yes   # AOF 방식으로 데이터 영속화
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  redis_data:

networks:
  moadeal-network:
    driver: bridge